---
supabase_enabled: false
supabase_available_externally: false

# Optional services
supabase_realtime_enabled: true
supabase_storage_enabled: true
supabase_functions_enabled: true

# directories
supabase_data_directory: "{{ docker_home }}/supabase"

# network
supabase_network_name: "supabase"
supabase_hostname: "supabase"

# ports
supabase_kong_http_port: "8186"
supabase_kong_https_port: "8188"
supabase_db_port: "5442"
supabase_pooler_port: "6543"

# specs
supabase_db_memory: 1g
supabase_supavisor_memory: 512m
supabase_meta_memory: 256m
supabase_auth_memory: 512m
supabase_rest_memory: 256m
supabase_realtime_memory: 512m
supabase_storage_memory: 512m
supabase_imgproxy_memory: 1g
supabase_functions_memory: 512m
supabase_kong_memory: 2g
supabase_studio_memory: 512m

# container names
supabase_db_container_name: "supabase_db"
supabase_supavisor_container_name: "supabase_pooler"
supabase_meta_container_name: "supabase_meta"
supabase_auth_container_name: "supabase_auth"
supabase_rest_container_name: "supabase_rest"
supabase_realtime_container_name: "supabase_realtime"
supabase_storage_container_name: "supabase_storage"
supabase_imgproxy_container_name: "supabase_imgproxy"
supabase_functions_container_name: "supabase_functions"
supabase_kong_container_name: "supabase_kong"
supabase_studio_container_name: "supabase_studio"

# images
supabase_db_image: "supabase/postgres"
supabase_db_tag: "15.8.1.085"
supabase_supavisor_image: "supabase/supavisor"
supabase_supavisor_tag: "2.9.5"
supabase_meta_image: "supabase/postgres-meta"
supabase_meta_tag: "v0.96.6"
supabase_auth_image: "supabase/gotrue"
supabase_auth_tag: "v2.189.0"
supabase_rest_image: "postgrest/postgrest"
supabase_rest_tag: "v14.12"
supabase_realtime_image: "supabase/realtime"
supabase_realtime_tag: "v2.102.3"
supabase_storage_image: "supabase/storage-api"
supabase_storage_tag: "v1.60.4"
supabase_imgproxy_image: "darthsim/imgproxy"
supabase_imgproxy_tag: "v3.30.1"
supabase_functions_image: "supabase/edge-runtime"
supabase_functions_tag: "v1.74.0"
supabase_kong_image: "kong/kong"
supabase_kong_tag: "3.9.1"
supabase_studio_image: "supabase/studio"
supabase_studio_tag: "2026.06.03-sha-0bca601"

# database
supabase_postgres_password: "your-super-secret-and-long-postgres-password"
supabase_postgres_host: "{{ supabase_db_container_name }}"
supabase_postgres_db: "postgres"
supabase_postgres_port: "5432"

